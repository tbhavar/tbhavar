<svg width="600" height="154" viewBox="0 0 600 154" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="154" rx="10" fill="#1a1b27"/>
  
  <!-- Left Quote Icon -->
  <text fill="#bf91f3" font-family="'Poppins', sans-serif, 'Segoe UI', Tahoma, Geneva, Verdana" font-size="32" font-weight="bold" x="20" y="45">“</text>
  
